url: https://strategicprojects.github.io/comexr/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0d6efd"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem

home:
  title: comexr - R Interface to Brazilian ComexStat API
  description: >
    R package for querying Brazilian export and import data through
    the ComexStat API (MDIC).

authors:
  Andre Leite:
    href: https://github.com/StrategicProjects

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/StrategicProjects/comexr
      aria-label: GitHub

reference:
  - title: "Main Query Functions"
    desc: "Functions to query foreign trade data"
    contents:
      - comex_query
      - comex_export
      - comex_import
      - comex_query_city
      - comex_historical

  - title: "Session Management"
    desc: "Functions to manage browser session for API access"
    contents:
      - comex_init
      - comex_close

  - title: "API Metadata"
    desc: "Functions to get API information"
    contents:
      - comex_last_update
      - comex_available_years
      - comex_filters
      - comex_filter_values
      - comex_details
      - comex_metrics

  - title: "Auxiliary Tables - Geography"
    desc: "Functions to query geographic tables"
    contents:
      - comex_countries
      - comex_country_detail
      - comex_blocs
      - comex_states
      - comex_state_detail
      - comex_cities
      - comex_city_detail
      - comex_transport_modes
      - comex_transport_mode_detail
      - comex_customs_units
      - comex_customs_unit_detail

  - title: "Auxiliary Tables - Products"
    desc: "Functions to query product classification tables"
    contents:
      - comex_ncm
      - comex_ncm_detail
      - comex_nbm
      - comex_nbm_detail
      - comex_hs

  - title: "Auxiliary Tables - Economic Classifications"
    desc: "Functions to query economic classification tables"
    contents:
      - comex_cgce
      - comex_sitc
      - comex_isic

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - comexr

news:
  releases:
    - text: "Version 0.2.0"
      href: https://github.com/StrategicProjects/comexr/releases/tag/v0.2.0

footer:
  structure:
    left: developed_by
    right: built_with
